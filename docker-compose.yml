version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - ./e-todo.sql:/docker-entrypoint-initdb.d/e-todo.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
  backend:
    build: ./backend
    ports:
      - "${PORT}:${PORT}"
    environment:
      - MYSQL_HOST=db
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - PORT=${PORT}
      - SECRET=${SECRET}
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./front-end
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:${PORT}
    depends_on:
      - backend
